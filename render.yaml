services:
  - type: web
    name: logwatch-backend
    runtime: node
    plan: free # Can be upgraded for high-volume logs
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      # --- AWS SECRETS ---
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # --- CLOUD DATA ---
      - key: S3_BUCKET_NAME
        sync: false
      - key: DYNAMO_TABLE_NAME
        sync: false
      - key: CW_LOG_GROUP_LOGIN
        sync: false
      - key: CW_LOG_GROUP_UPLOAD
        sync: false
      - key: CW_LOG_GROUP_PAYMENT
        sync: false
      # --- CONNECTIVITY ---
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel URL after frontend deploy
